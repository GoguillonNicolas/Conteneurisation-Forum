<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture - Forum Anonyme</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: 'Outfit', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 2rem;
            text-align: center;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 2rem; background: linear-gradient(45deg, #38bdf8, #818cf8); -webkit-background-clip: text; color: transparent; }
        .container { max-width: 800px; margin: 3rem auto; padding: 0 1rem; }
        .message-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s, background 0.3s;
            animation: fadeIn 0.5s ease-out backwards;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }
        .message-card:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.04); border-color: rgba(56, 189, 248, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-header { margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 0.5rem; }
        .pseudo { font-weight: 800; color: #38bdf8; font-size: 1.1rem; }
        .date { font-size: 0.85rem; color: #64748b; }
        .content { line-height: 1.6; color: #f8fafc; font-size: 1.05rem; white-space: pre-wrap; word-break: break-word; }
        .loader { text-align: center; color: #94a3b8; padding: 2rem; }
        .empty { text-align: center; padding: 3rem; color: #64748b; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Le Mur Anonyme.</h1>
    </div>
    <div class="container" id="messages-container">
        <div class="loader">Chargement des messages...</div>
    </div>

    <script>
        const container = document.getElementById('messages-container');

        async function fetchMessages() {
            try {
                // Reverse-proxy automatique par le conteneur Nginx !
                const res = await fetch('/api/messages');
                if (!res.ok) throw new Error("Erreur de récupération");
                const messages = await res.json();
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty">Aucun message n\'a encore été posté. Soyez le premier !</div>';
                    return;
                }

                container.innerHTML = '';
                messages.forEach((msg, index) => {
                    const div = document.createElement('div');
                    div.className = 'message-card';
                    div.style.animationDelay = `${index * 0.05}s`;
                    
                    const date = new Date(msg.created_at).toLocaleString('fr-FR');
                    
                    div.innerHTML = `
                        <div class="msg-header">
                            <span class="pseudo">@${msg.pseudo}</span>
                            <span class="date">${date}</span>
                        </div>
                        <div class="content">${msg.content}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div class="empty" style="color:#ef4444;">Impossible de joindre le serveur ou aucun message.</div>';
            }
        }

        fetchMessages();
        // Rafraichissement automatique toutes les 5 secondes
        setInterval(fetchMessages, 5000);
    </script>
</body>
</html>
